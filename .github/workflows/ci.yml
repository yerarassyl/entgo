name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: entgo
          POSTGRES_USER: entgo
          POSTGRES_PASSWORD: entgo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U entgo -d entgo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://entgo:entgo_ci@127.0.0.1:5432/entgo
      REDIS_URL: redis://127.0.0.1:6379
      AUTH_SECRET: ci-only-secret-with-more-than-32-characters
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run db:deploy
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
