services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: entgo
      POSTGRES_USER: entgo
      POSTGRES_PASSWORD: entgo_local_only
    ports:
      - "5432:5432"
    volumes:
      - entgo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entgo -d entgo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes --requirepass entgo_local_only
    ports:
      - "6379:6379"
    volumes:
      - entgo_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "entgo_local_only", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  entgo_postgres:
  entgo_redis:
